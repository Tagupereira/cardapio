<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cardápio Digital - Pizzaria</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playball&family=Oswald:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #e2b04a;
            --accent-gold: #ffcc00;
            --bg-dark: #0f0f0f;
            --bg-card: #1a1a1a;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            line-height: 1.4;
            overflow-x: hidden;
            /* Hide scrollbars */
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        /* Hide scrollbar for Chrome, Safari and Opera everywhere */
        ::-webkit-scrollbar {
            display: none !important;
            width: 0 !important;
            height: 0 !important;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* Cart Floating Button */
        .cart-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ff9600;
            color: #000;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 1000;
            cursor: pointer;
            border: none;
            transition: transform 0.2s;
        }

        .cart-float:active { transform: scale(0.9); }

        .cart-count {
            position: absolute;
            top: 0;
            right: 0;
            background: #ff0000;
            color: white;
            font-size: 0.7rem;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 2px solid var(--bg-dark);
        }

        /* Modal / Cart View */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: none;
            flex-direction: column;
            padding: 20px;
        }

        .modal.active { display: flex; }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .modal-content {
            flex-grow: 1;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #222;
        }

        .cart-item-info h4 { color: var(--primary-gold); font-size: 1rem; }
        .cart-item-info p { font-size: 0.8rem; color: var(--text-muted); }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .qty-btn {
            background: #333;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Order Form */
        .order-form {
            margin-top: 20px;
            padding: 20px;
            background: #111;
            border-radius: 15px;
            border: 1px solid #333;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: #ff9600; font-weight: bold; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
        }

        .checkout-btn {
            background: #25d366;
            color: white;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .add-to-cart-btn {
            background: transparent;
            border: 1px solid #ff9600;
            color: #ff9600;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.75rem;
            margin-top: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }

        .add-to-cart-btn:hover {
            background: #ff9600;
            color: #000;
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-size: cover;
            background-position: center;
            padding: 20px;
            overflow: hidden;
            border-bottom: 4px solid var(--primary-gold);
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.9));
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .logo {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            /* border: 3px solid var(--primary-gold); */
            margin-bottom: 15px;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(226, 176, 74, 0.4);
        }

        .hero h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 0;
            line-height: 1;
            color: white;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.5);
        }

        .hero h2 {
            font-family: 'Playball', cursive;
            font-size: 2.2rem;
            color: var(--primary-gold);
            margin-top: -10px;
        }

        /* Menu Section */
        /* .menu-section {
            padding: 40px 0;
        } */

        .category-header {
            display: flex;
            text-align: center;
            margin: 0px auto 30px;
            padding:20px;
            position: relative;
            background-color: #ff9600;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        /* .category-header::after {
            content: '▼';
            display: block;
            color: var(--primary-gold);
            font-size: 0.8rem;
            margin-top: 5px;
            opacity: 0.5;
        } */

        .category-title {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 3rem;
            /* color: var(--primary-gold); */
            display: inline-block;
        }

        /* Lock scroll when modal is open */
        body.no-scroll {
            overflow: hidden !important;
            height: 100vh;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 1000px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .products-grid {
                gap: 15px;
                padding: 0 5px;
                margin-bottom: 30px;
            }
            .hero h1 { font-size: 2.0rem; letter-spacing: 2px; }
            .hero h2 { font-size: 2.6rem; }
            
            .product-card {
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 10px;
            }
            
            .product-img {
                width: 120px;
                height: 120px;
            }

            .product-info h3 {
                font-size: 1.1rem;
            }

            .price-container {
                justify-content: center;
            }
            
            .category-title {
                font-size: 2.2rem;
            }
        }

        .product-card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            transition: transform 0.2s;
        }

        .product-image-container {
            position: relative;
            flex-shrink: 0;
        }

        .product-number {
            position: absolute;
            top: -10px;
            left: -10px;
            background: #fff;
            color: #000;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.5rem;
            z-index: 2;
            border: 2px solid #000;
            display:none;
        }

        .product-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-gold);
            background-color: #222;
        }

        .product-info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-content: center;
            justify-content: space-around;
            align-items: center;
        }

        .product-info h3 {
            font-family: 'Oswald', sans-serif;
            font-size: 1.4rem;
            color: var(--primary-gold);
            text-transform: uppercase;
        }

        .product-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .price-container {
            display: flex;
            gap: 15px;
        }

        .price-item {
            text-align: center;
        }

        .price-value {
            font-family: 'Oswald', sans-serif;
            font-size: 2.0rem;
            color: white;
            font-weight: bold;
        }

        .price-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: -2px;
        }

        /* Footer */
        .footer {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 15px;
            text-align: center;
            border-top: 1px solid #333;
            z-index: 100;
        }

        .footer a {
            color: var(--accent-gold);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        /* Loading Animation */
        .loading {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(226, 176, 74, 0.2);
            border-top: 3px solid var(--primary-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="loading" class="loading">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <header id="hero" class="hero">
            <div class="hero-content">
                <img id="logo" class="logo" src="" alt="Logo">
                <h1 id="comercio-name">Carregando...</h1>
                <h2 id="subtitle">Cardápio</h2>
            </div>
        </header>

        <main id="menu-container" class="menu-section">
            <!-- Categorias e produtos entrarão aqui -->
        </main>

        <footer class="footer">
            <a href="https://www.instagram.com/tagu.designer" target="_blank">© 2026 - Desenvolvedor</a>
        </footer>
    </div>

    <!-- Floating Cart Button -->
    <button class="cart-float" onclick="toggleCart()">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
        <span id="cart-count-badge" class="cart-count">0</span>
    </button>

    <!-- Checkout Modal -->
    <div id="cart-modal" class="modal">
        <div class="modal-header">
            <h2 style="font-family: Oswald, sans-serif; color: #ff9600; text-transform: uppercase;">Finalizar Pedido</h2>
            <button onclick="toggleCart()" style="background:none; border:none; color:white; font-size:2rem; cursor:pointer;">&times;</button>
        </div>
        
        <div class="modal-content">
            <div id="cart-items-list"></div>

            <div id="cart-summary" style="display:none; margin-top:30px;">
                <div style="display:flex; justify-content:space-between; font-size:1.4rem; font-weight:bold; padding:20px 0; border-top:2px solid #333; color: white;">
                    <span>TOTAL</span>
                    <span id="cart-total-value">R$ 0,00</span>
                </div>

                <div class="order-form">
                    <div class="form-group">
                        <label>Seu Nome</label>
                        <input type="text" id="cust-name" placeholder="Como devemos te chamar?">
                    </div>
                    <div class="form-group">
                        <label>Endereço de Entrega</label>
                        <input type="text" id="cust-address" placeholder="Rua, Número, Bairro (ou 'Retirada')">
                    </div>
                    <div class="form-group">
                        <label>Forma de Pagamento</label>
                        <select id="pay-method" onchange="handlePaymentChange(this.value)">
                            <option value="Pix">Pix</option>
                            <option value="Cartão de Crédito">Cartão de Crédito</option>
                            <option value="Cartão de Débito">Cartão de Débito</option>
                            <option value="Dinheiro">Dinheiro</option>
                        </select>
                    </div>
                    <div id="troco-group" class="form-group" style="display:none;">
                        <label>Troco para quanto?</label>
                        <input type="number" id="troco-val" placeholder="Ex: 50.00">
                    </div>
                </div>

                <button onclick="sendWhatsApp()" class="checkout-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.438 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.414 0 .018 5.396.015 12.03c0 2.12.541 4.189 1.57 6.007L0 24l6.105-1.604a11.803 11.803 0 005.937 1.597h.005c6.634 0 12.032-5.396 12.035-12.03a11.77 11.77 0 00-3.489-8.482z"/></svg>
                    ENVIAR PEDIDO
                </button>
            </div>
        </div>
    </div>

    <script>
        const sheetID = "1dUpN4a6PFuxnxCU1S_fTniiGmifhha8X3XfNYvszbjc";
        const configSheet = "config";
        const menuSheet = "cardapio1";
        const imgGoogle = "https://lh3.googleusercontent.com/d/";

        let cart = [];
        let waNumber = "5511999999999"; 

        const elements = {
            hero: document.getElementById('hero'),
            logo: document.getElementById('logo'),
            comercioName: document.getElementById('comercio-name'),
            menuContainer: document.getElementById('menu-container'),
            loading: document.getElementById('loading'),
            cartBadge: document.getElementById('cart-count-badge'),
            cartModal: document.getElementById('cart-modal'),
            cartList: document.getElementById('cart-items-list'),
            cartSummary: document.getElementById('cart-summary'),
            cartTotal: document.getElementById('cart-total-value')
        };

        // Fetch Config
        async function loadConfig() {
            try {
                const response = await fetch(`https://opensheet.elk.sh/${sheetID}/${configSheet}`);
                const data = await response.json();
                const config = data[0];

                elements.comercioName.innerText = config.comercio || "Pizzaria";
                elements.logo.src = config.logourl || (imgGoogle + config.logodrive);
                waNumber = config.whatsapp || waNumber;
                
                const bg = config.backgroundurl || (config.backgrounddrive ? (imgGoogle + config.backgrounddrive) : "");
                if(bg) elements.hero.style.backgroundImage = `url(${bg})`;
                
                if(config.subtitulo) document.getElementById('subtitle').innerText = config.subtitulo;

            } catch (error) {
                console.error("Erro ao carregar configurações:", error);
            }
        }

        // Fetch Menu
        async function loadMenu() {
            try {
                const response = await fetch(`https://opensheet.elk.sh/${sheetID}/${menuSheet}`);
                const products = await response.json();

                const categoriesMap = {};
                products.forEach(prod => {
                    if (prod.estado === "off") return;
                    if (!categoriesMap[prod.categoria]) categoriesMap[prod.categoria] = [];
                    categoriesMap[prod.categoria].push(prod);
                });

                renderMenu(categoriesMap);
                elements.loading.style.display = 'none';
            } catch (error) {
                console.error("Erro ao carregar menu:", error);
                elements.loading.innerHTML = "<p>Erro ao carregar cardápio. Tente novamente.</p>";
            }
        }

        function renderMenu(categoriesMap) {
            elements.menuContainer.innerHTML = '';
            let globalIndex = 1;

            Object.keys(categoriesMap).forEach(catName => {
                const section = document.createElement('section');
                section.className = 'category-group';
                
                section.innerHTML = `
                    <div class="category-header">
                        <h2 class="category-title">${catName}</h2>
                    </div>
                    <div class="products-grid">
                        ${categoriesMap[catName].map(item => {
                            const num = String(globalIndex++).padStart(2, '0');
                            const prices = parsePrices(item.preco);
                            
                            return `
                            <div class="product-card">
                                <div class="product-image-container">
                                    <div class="product-number">${num}</div>
                                    <img class="product-img" src="${imgGoogle + item.img}" alt="${item.nome}" onerror="this.src='https://via.placeholder.com/150/222/e2b04a?text=Pizza'">
                                </div>
                                <div class="product-info">
                                    <h3>${item.nome}</h3>
                                    <p class="product-desc" title="${item.descricao || ''}">${item.descricao || ''}</p>
                                    
                                    <div class="price-container">
                                        ${prices.map(p => `
                                            <div class="price-item">
                                                <div class="price-value">R$ ${p.value}</div>
                                                <div class="price-label">${p.label}</div>
                                                <button class="add-to-cart-btn" onclick="addToCart('${item.nome}','${item.categoria}', '${p.value}', '${p.label}')">+ Adicionar</button>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>
                            `;
                        }).join('')}
                    </div>
                `;
                elements.menuContainer.appendChild(section);
            });
        }

        function parsePrices(priceStr) {
            if (!priceStr) return [{ value: '?', label: '-' }];
            
            const parts = String(priceStr).split(/-|\//);
            if (parts.length === 3) {
                return [
                    { value: parts[0].trim(), label: '4 ped' },
                    { value: parts[1].trim(), label: '8 ped' },
                    { value: parts[2].trim(), label: '12 ped' }
                ];
            }
            if (parts.length === 2) {
                return [
                    { value: parts[0].trim(), label: 'Port' },
                    { value: parts[1].trim(), label: 'Grande' }
                ];
            }
            return [{ value: priceStr.trim(), label: '' }];
        }

        // --- Lógica Carrinho ---

        function toggleCart() {
            const isActive = elements.cartModal.classList.toggle('active');
            if (isActive) {
                document.body.classList.add('no-scroll');
            } else {
                document.body.classList.remove('no-scroll');
            }
            renderCartItems();
        }

        function addToCart(name, category, price, size) {
            const priceVal = parseFloat(price.replace(',', '.'));
            const existing = cart.find(i => i.name === name && i.size === size);
            
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ name, category, price: priceVal, size, qty: 1 });
             
            }
            updateBadge();
        }

        function updateBadge() {
            const count = cart.reduce((acc, item) => acc + item.qty, 0);
            elements.cartBadge.innerText = count;
        }

        function renderCartItems() {
            if (cart.length === 0) {
                elements.cartList.innerHTML = '<p style="text-align:center; padding:40px; color:var(--text-muted);">Carrinho vazio.</p>';
                elements.cartSummary.style.display = 'none';
                return;
            }

            elements.cartSummary.style.display = 'block';
            let total = 0;
            elements.cartList.innerHTML = cart.map((item, idx) => {
                                
                total += item.price * item.qty;
                return `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <h4>${item.name}</h4>
                            <p>- ${item.category}</p>
                            <p>${item.size} - R$ ${item.price.toFixed(2).replace('.', ',')}</p>
                        </div>
                        <div class="cart-item-controls">
                            <button class="qty-btn" onclick="updateQty(${idx}, -1)">-</button>
                            <span>${item.qty}</span>
                            <button class="qty-btn" onclick="updateQty(${idx}, 1)">+</button>
                        </div>
                    </div>
                `;
            }).join('');
            elements.cartTotal.innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
        }

        function updateQty(idx, delta) {
            cart[idx].qty += delta;
            if (cart[idx].qty <= 0) cart.splice(idx, 1);
            renderCartItems();
            updateBadge();
        }

        function handlePaymentChange(val) {
            document.getElementById('troco-group').style.display = (val === 'Dinheiro') ? 'block' : 'none';
        }

        function sendWhatsApp() {
            const name = document.getElementById('cust-name').value;
            const address = document.getElementById('cust-address').value;
            const pay = document.getElementById('pay-method').value;
            const troco = document.getElementById('troco-val').value;

            if (!name || !address) return alert("Por favor, preencha seu nome e a opção de entrega/endereço.");

            let total = 0;
            let msg = `*Novo Pedido - ${elements.comercioName.innerText}*\n`;
            msg += `*Cliente:* ${name}\n`;
            msg += `*Opção de Entrega:* ${address}\n`;
            msg += `*Itens:*\n`;

            cart.forEach(item => {
                const sub = item.price * item.qty;
                total += sub;
                msg += `* ${item.qty}x ${item.name}${item.size ? ' ('+item.size+')' : ''} (R$ ${sub.toFixed(2).replace('.', ',')})\n`;
            });

            msg += `*Total:* R$ ${total.toFixed(2).replace('.', ',')}\n`;
            msg += `*Pagamento:* ${pay}\n`;
            
            if (pay === 'Dinheiro' && troco) {
                const trocoValor = parseFloat(troco.replace(',', '.'));
                if (!isNaN(trocoValor)) {
                    msg += `*Troco para:* R$ ${trocoValor.toFixed(2).replace('.', ',')}\n`;
                }
            }

            const encoded = encodeURIComponent(msg);
            window.open(`https://wa.me/${waNumber.replace(/\D/g, '')}?text=${encoded}`, '_blank');
        }

        // Inicialização
        window.addEventListener('DOMContentLoaded', () => {
            loadConfig();
            loadMenu();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cardápio Digital - Pizzaria</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playball&family=Oswald:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #e2b04a;
            --accent-gold: #ffcc00;
            --bg-dark: #0f0f0f;
            --bg-card: #1a1a1a;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            line-height: 1.4;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-size: cover;
            background-position: center;
            padding: 20px;
            overflow: hidden;
            border-bottom: 4px solid var(--primary-gold);
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.9));
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .logo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid var(--primary-gold);
            margin-bottom: 15px;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(226, 176, 74, 0.4);
        }

        .hero h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 0;
            line-height: 1;
            color: white;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.5);
        }

        .hero h2 {
            font-family: 'Playball', cursive;
            font-size: 2.2rem;
            color: var(--primary-gold);
            margin-top: -10px;
        }

        /* Menu Section */
        /* .menu-section {
            padding: 40px 0;
        } */

        .category-header {
            display: flex;
            text-align: center;
            margin: 0px auto 30px;
            padding:20px;
            position: relative;
            background-color: #ff9600;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        /* .category-header::after {
            content: '▼';
            display: block;
            color: var(--primary-gold);
            font-size: 0.8rem;
            margin-top: 5px;
            opacity: 0.5;
        } */

        .category-title {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 3rem;
            /* color: var(--primary-gold); */
            display: inline-block;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 1000px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .products-grid {
                gap: 15px;
                padding: 0 5px;
                margin-bottom: 30px;
            }
            .hero h1 { font-size: 2.0rem; letter-spacing: 2px; }
            .hero h2 { font-size: 2.6rem; }
            
            .product-card {
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 10px;
            }
            
            .product-img {
                width: 120px;
                height: 120px;
            }

            .product-info h3 {
                font-size: 1.1rem;
            }

            .price-container {
                justify-content: center;
            }
            
            .category-title {
                font-size: 2.2rem;
            }
        }

        .product-card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            transition: transform 0.2s;
        }

        .product-image-container {
            position: relative;
            flex-shrink: 0;
        }

        .product-number {
            position: absolute;
            top: -10px;
            left: -10px;
            background: #fff;
            color: #000;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.5rem;
            z-index: 2;
            border: 2px solid #000;
            display:none;
        }

        .product-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-gold);
            background-color: #222;
        }

        .product-info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-content: center;
            justify-content: space-around;
            align-items: center;
        }

        .product-info h3 {
            font-family: 'Oswald', sans-serif;
            font-size: 1.4rem;
            color: var(--primary-gold);
            text-transform: uppercase;
        }

        .product-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .price-container {
            display: flex;
            gap: 15px;
        }

        .price-item {
            text-align: center;
        }

        .price-value {
            font-family: 'Oswald', sans-serif;
            font-size: 2.0rem;
            color: white;
            font-weight: bold;
        }

        .price-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: -2px;
        }

        /* Footer */
        .footer {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 15px;
            text-align: center;
            border-top: 1px solid #333;
            z-index: 100;
        }

        .footer a {
            color: var(--accent-gold);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        /* Loading Animation */
        .loading {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(226, 176, 74, 0.2);
            border-top: 3px solid var(--primary-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="loading" class="loading">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <header id="hero" class="hero">
            <div class="hero-content">
                <img id="logo" class="logo" src="" alt="Logo">
                <h1 id="comercio-name">Carregando...</h1>
                <h2 id="subtitle">Cardápio</h2>
            </div>
        </header>

        <main id="menu-container" class="menu-section">
            <!-- Categorias e produtos entrarão aqui -->
        </main>

        <footer class="footer">
            <a href="https://www.instagram.com/tagu.designer" target="_blank">© 2026 - Desenvolvedor</a>
        </footer>
    </div>

    <script>
        const sheetID = "1dUpN4a6PFuxnxCU1S_fTniiGmifhha8X3XfNYvszbjc";
        const configSheet = "config";
        const menuSheet = "cardapio1";
        const imgGoogle = "https://lh3.googleusercontent.com/d/";

        const elements = {
            hero: document.getElementById('hero'),
            logo: document.getElementById('logo'),
            comercioName: document.getElementById('comercio-name'),
            menuContainer: document.getElementById('menu-container'),
            loading: document.getElementById('loading')
        };

        // Fetch Config
        async function loadConfig() {
            try {
                const response = await fetch(`https://opensheet.elk.sh/${sheetID}/${configSheet}`);
                const data = await response.json();
                const config = data[0];

                elements.comercioName.innerText = config.comercio || "Pizzaria";
                elements.logo.src = config.logourl || (imgGoogle + config.logodrive);
                
                const bg = config.backgroundurl || (config.backgrounddrive ? (imgGoogle + config.backgrounddrive) : "");
                if(bg) elements.hero.style.backgroundImage = `url(${bg})`;
                
                if(config.subtitulo) document.getElementById('subtitle').innerText = config.subtitulo;

            } catch (error) {
                console.error("Erro ao carregar configurações:", error);
            }
        }

        // Fetch Menu
        async function loadMenu() {
            try {
                const response = await fetch(`https://opensheet.elk.sh/${sheetID}/${menuSheet}`);
                const products = await response.json();

                const categoriesMap = {};
                products.forEach(prod => {
                    if (prod.estado === "off") return;
                    if (!categoriesMap[prod.categoria]) categoriesMap[prod.categoria] = [];
                    categoriesMap[prod.categoria].push(prod);
                });

                renderMenu(categoriesMap);
                elements.loading.style.display = 'none';
            } catch (error) {
                console.error("Erro ao carregar menu:", error);
                elements.loading.innerHTML = "<p>Erro ao carregar cardápio. Tente novamente.</p>";
            }
        }

        function renderMenu(categoriesMap) {
            elements.menuContainer.innerHTML = '';
            let globalIndex = 1;

            Object.keys(categoriesMap).forEach(catName => {
                const section = document.createElement('section');
                section.className = 'category-group';
                
                section.innerHTML = `
                    <div class="category-header">
                        <h2 class="category-title">${catName}</h2>
                    </div>
                    <div class="products-grid">
                        ${categoriesMap[catName].map(item => {
                            const num = String(globalIndex++).padStart(2, '0');
                            const prices = parsePrices(item.preco);
                            
                            return `
                            <div class="product-card">
                                <div class="product-image-container">
                                    <div class="product-number">${num}</div>
                                    <img class="product-img" src="${imgGoogle + item.img}" alt="${item.nome}" onerror="this.src='https://via.placeholder.com/150/222/e2b04a?text=Pizza'">
                                </div>
                                <div class="product-info">
                                    <h3>${item.nome}</h3>
                                    <p class="product-desc" title="${item.descricao || ''}">${item.descricao || ''}</p>
                                    <div class="price-container">
                                        ${prices.map(p => `
                                            <div class="price-item">
                                                <div class="price-value">R$ ${p.value}</div>
                                                <div class="price-label">${p.label}</div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>
                            `;
                        }).join('')}
                    </div>
                `;
                elements.menuContainer.appendChild(section);
            });
        }

        function parsePrices(priceStr) {
            if (!priceStr) return [{ value: '?', label: '-' }];
            
            const parts = String(priceStr).split(/-|\//);
            if (parts.length === 3) {
                return [
                    { value: parts[0].trim(), label: '4 ped' },
                    { value: parts[1].trim(), label: '8 ped' },
                    { value: parts[2].trim(), label: '12 ped' }
                ];
            }
            if (parts.length === 2) {
                return [
                    { value: parts[0].trim(), label: 'Port' },
                    { value: parts[1].trim(), label: 'Grande' }
                ];
            }
            return [{ value: priceStr.trim(), label: '' }];
        }

        // Inicialização
        window.addEventListener('DOMContentLoaded', () => {
            loadConfig();
            loadMenu();
        });
    </script>
</body>
</html>

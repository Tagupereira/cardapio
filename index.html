<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1, maximum-scale=1" name="viewport" />
    <title>Cardápio</title>
    <!-- <link rel="stylesheet" href="style.css"> -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Changa+One:ital@0;1&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            width: 100%;
            background: #111;
            font-family: Arial;
            display: flex;
            justify-content: center;
            margin: 0;
            display: flex;
            flex-direction: column;
            
        }

        .changa-one-regular {
            font-family: "Changa One", sans-serif;
            font-weight: 400;
            font-style: normal;
        }

        .changa-one-regular-italic {
            font-family: "Changa One", sans-serif;
            font-weight: 400;
            font-style: italic;
        }
        .container {
            width: 100%;
            background: #1a1a1a;
            color: white;
            min-height: 100vh;
                     
        }
        .topo{
            padding: 20px 0;
            color: #ffffff;
            font-size: 1rem;
            background-size: cover;
            background-position: center;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            text-align: center;
        }
        .title{
            margin: 10px 0px 0px 0px;
        }
        .logo{
            width: 150px;
            /* height: 100px; */
            border-radius: 50%;
        }
        /* .menu{
            margin-bottom: 60px;
        } */
        .item {
            display: flex;
            width: 100%;
            align-items: center;
            padding: 5px;
            /* border-bottom: 1px solid #333; */
            /* justify-content: space-around; */
            flex-direction: column;
            text-align: center;
            border-bottom: 1px solid #ccc;
        }

        .item img {
            width: 100%;
            height: 100px;
            border-radius: 10px;
            object-fit: cover;
        }

        .info {
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            padding: 10px;
        }
        .cardapioTitle{
            text-align: center;
            font-size: 2rem;
            margin:10px;
        }

        .nome {
            text-align: center;
            font-size: 2rem;
            font-family: "poppins";
            color: #ffffff;
        }

        .description{
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 100;
        }

        .preco {
            color: #ffcc00;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        summary{
            background: #000;
            color: #ffcc00;
            text-align: center;
            padding: 10px;
            font-size: 2.5rem;
            margin:5px 0;
            list-style: none;

        }
        summary::-webkit-details-marker {
            display: none;
        }
        
        details[open] summary {
            background: #791818;
        }

        .footer{
            width: 100%;
            background: #000;
            text-align: center;
            padding: 20px;
            
            position: sticky;
    bottom: 0;
        }
       .footer a{
            color: #ffcc00;
            font-size: 1rem;
            text-decoration:none;
       }

    </style>

</head>

<body>
    <div class="container">
        <div id="topo" class="topo">
            <img id="logo" class="logo" alt="">
            <h1 id="title" class="title changa-one-regular-italic"></h1>            
        </div>

        
        <div id="menu" class="menu changa-one-regular">
            <p class="cardapioTitle categoria">
                CARDÁPIO
            </p>

        </div>
    </div>

    

    <!-- <script src="script.js"></script> -->
    <script>
        const menu = document.getElementById("menu");
        const listJson = "https://opensheet.elk.sh/1dUpN4a6PFuxnxCU1S_fTniiGmifhha8X3XfNYvszbjc/";
        const cardapio= "cardapio1";
        const config= "config";
        const imgGoogle = "https://lh3.googleusercontent.com/d/";
        const title = document.getElementById("title");
        const topo = document.getElementById("topo");
        const logo = document.getElementById("logo");


///////////////////////////////////////////fetch configurações
         fetch(listJson+config)
            .then(res => res.json())
            .then(configuracao => {

                
                title.innerText = configuracao[0].comercio;
                topo.style.backgroundImage = `url(${configuracao[0].backgroundurl + (imgGoogle+configuracao[0].backgrounddrive)})`;
                logo.setAttribute("src", configuracao[0].logourl + (imgGoogle+configuracao[0].logodrive));


            })

//////////////////////////////////////////////////////////////

///////////////////////////////////////////fetch lista cardapio
        fetch(listJson+cardapio)
            .then(res => res.json())
            .then(produtos => {

                
                const categorias = {}

                produtos.forEach(prod => {

                    if (!categorias[prod.categoria]) {
                        categorias[prod.categoria] = []
                    }

                    categorias[prod.categoria].push(prod)

                })



                Object.keys(categorias).forEach(nomeCategoria => {

                    const itensAtivos = categorias[nomeCategoria].filter(item => item.estado === "on");

                    if (itensAtivos.length > 0) {

                        menu.innerHTML += `
                            <details class="categoria">
                                <summary>${nomeCategoria}</summary>

                                ${itensAtivos.map(item => `
                                    <div class="item">

                                        
                                        <img src="${imgGoogle + item.img}">

                                     <div class="info">
                                         <div class="nome">${item.nome}</div>
                                         <p class="description">${item.descricao}</p>
                                         <div class="preco">R$ ${item.preco}</div>
                                     </div>

                                    </div>
                                `).join("")}
                            </details>
                        `;
                    }

                });

                menu.addEventListener("toggle", (e) => {
                    if (e.target.tagName === "DETAILS" && e.target.open) {

                        // fecha os outros
                        menu.querySelectorAll("details").forEach(outro => {
                            if (outro !== e.target) {
                                outro.open = false;
                            }
                        });

                        // faz scroll suave até o item
                        e.target.scrollIntoView({
                            behavior: "smooth",
                            block: "start"
                        });
                    }
                }, true);

            })

            
    </script>
</body>
<footer class="footer">
    <a href="https://www.instagram.com/tagu.designer" target="_blank">© 2026 - Desenvolvedor</a>
</footer>
</html>

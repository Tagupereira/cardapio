<!DOCTYPE html>

    <head>
        <meta charset="UTF-8">
        <meta content="width=device-width, initial-scale=1, maximum-scale=1" name="viewport" />
        <title>Cardápio</title>
        <link rel="stylesheet" href="style.css">
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Changa+One:ital@0;1&display=swap');
*{
    box-sizing: border-box;
}

.changa-one-regular {
  font-family: "Changa One", sans-serif;
  font-weight: 400;
  font-style: normal;
}

.changa-one-regular-italic {
  font-family: "Changa One", sans-serif;
  font-weight: 400;
  font-style: italic;
}

body {
    background: #111;
    font-family: Arial;
    display: flex;
    justify-content: center;
    margin: 0;
}

.container {
    /* width: 360px; */
    background: #1a1a1a;
    color: white;
    min-height: 100vh;
}

.titulo {
    text-align: center;
    padding: 40px 0;
    margin:0;
    background: black;
    font-size: 2rem;
    
}


.categoria {
    background: #000;
    color: #ffcc00;
    text-align: center;
    padding: 10px;
    font-size: 3rem;
}

.item {
    display: flex;
    width: 100%;
    align-items: center;
    padding: 05px;
    border-bottom: 1px solid #333;
    justify-content: space-around;
    flex-direction: row;
}

.item img {
    width: 50%;
    height: 200px;
    border-radius: 10px;
    object-fit: cover;
}

.info {
    
    width: 100%;
    height: 200px;
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
    align-items: center;
    padding: 5px;
}

.nome {
    /* font-weight: bold; */
    text-align: center;
    font-size: 2rem;
    font-family:"poppins";
}

.preco {
    color: #ffcc00;
    font-size: 2em;
}
        </style>

    </head>

    <body>
        <div class="container">
            <h1 id="title" class="titulo changa-one-regular-italic">Cardápio</h1>
            <div id="menu" class="changa-one-regular"></div>
        </div>
        
        <script src="script.js"></script>
        <script>
            const menu = document.getElementById("menu");
const listJson = "https://opensheet.elk.sh/1dUpN4a6PFuxnxCU1S_fTniiGmifhha8X3XfNYvszbjc/cardapio1";
const imgGoogle = "https://lh3.googleusercontent.com/d/";

fetch(listJson)
.then(res => res.json())
.then(produtos => {

    const title = document.getElementById("title")
    const menu = document.getElementById("menu")
    
    title.innerText = produtos[0].comercio;

    const categorias = {}

    produtos.forEach(prod => {

        if(!categorias[prod.categoria]){
            categorias[prod.categoria] = []
        }

        categorias[prod.categoria].push(prod)

    })

    Object.keys(categorias).forEach(nomeCategoria => {

        menu.innerHTML += `<div class="categoria">${nomeCategoria}</div>`

        categorias[nomeCategoria].forEach(item => {
           
            menu.innerHTML += `
            <div class="item">

            <img src="${imgGoogle+item.img}">

            <div class="info">
            <div class="nome">${item.nome}</div>
            <div class="preco">R$ ${item.preco}</div>
            </div>

            </div>
            `

        })

    })

})
